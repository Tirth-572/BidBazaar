<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; background-color: #f7f7f7; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 20px auto; padding: 20px; background-color: #ffffff; border-radius: 5px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); }
    h1 { text-align: center; color: #333333; }
    .new-password { font-size: 24px; font-weight: bold; color: #1a73e8; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>New Password Sent</h1>
    <p>Dear {{username}},</p>
    <p>Your new password:</p>
    <p class="new-password">New Password: {{password}}</p>
    <p>Best regards,<br>BidBazaar</p>
  </div>
</body>
</html>
